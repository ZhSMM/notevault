<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{BASE}}rss.xml" />
  <link rel="sitemap" type="application/xml" href="{{BASE}}sitemap.xml" />
  {{EXTRA_HEAD}}
  <style>
    /* === Reset & vars === */
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --bg-soft: #f6f8fa;
      --bg-code: #f6f8fa;
      --fg: #1f2328;
      --fg-subtle: #59636e;
      --fg-muted: #818b98;
      --border: #d1d9e0;
      --accent: #0969da;
      --accent-soft: #ddf4ff;
      --tag-bg: #ddf4ff;
      --tag-fg: #0969da;
      --wikilink: #0969da;
      --wikilink-broken: #cf222e;
      --blockref: #6e7781;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      --max-w: 880px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --bg-soft: #161b22;
        --bg-code: #161b22;
        --fg: #e6edf3;
        --fg-subtle: #9198a1;
        --fg-muted: #6e7681;
        --border: #30363d;
        --accent: #58a6ff;
        --accent-soft: #1f6feb33;
        --tag-bg: #1f6feb33;
        --tag-fg: #58a6ff;
        --wikilink: #58a6ff;
        --wikilink-broken: #ff7b72;
        --blockref: #9198a1;
        --shadow: 0 1px 3px rgba(0,0,0,0.3);
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.65;
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* === Layout === */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .brand {
      font-weight: 700;
      color: var(--fg);
      text-decoration: none;
      font-size: 1rem;
    }
    .brand:hover { color: var(--accent); }
    .nav {
      display: flex;
      gap: 0.75rem;
      flex: 1;
    }
    .nav a {
      color: var(--fg-subtle);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .nav a:hover { color: var(--accent); }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--fg-subtle);
      border-radius: 6px;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .theme-toggle:hover { color: var(--fg); border-color: var(--accent); }

    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 2rem 1.2rem 4rem;
    }

    /* === Page header === */
    .page-header { margin-bottom: 2rem; }
    .page-header h1 {
      font-size: 2rem;
      margin: 0 0 0.4rem;
      letter-spacing: -0.01em;
    }
    .lead {
      color: var(--fg-subtle);
      font-size: 0.95rem;
      margin: 0 0 1rem;
    }
    .crumb {
      font-size: 0.85rem;
      color: var(--fg-subtle);
      margin: 0 0 0.5rem;
    }
    .crumb a { color: var(--fg-subtle); text-decoration: none; }
    .crumb a:hover { color: var(--accent); }

    /* === Article === */
    .article-header { margin-bottom: 1.5rem; }
    .article-header h1 {
      font-size: 1.8rem;
      margin: 0.2rem 0 0.5rem;
      letter-spacing: -0.01em;
    }
    .article-meta {
      font-size: 0.85rem;
      color: var(--fg-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    .article-body { font-size: 1rem; }
    .article-body h1, .article-body h2, .article-body h3, .article-body h4 {
      margin-top: 2.2rem;
      margin-bottom: 0.8rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .article-body h1 { font-size: 1.7rem; }
    .article-body h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    .article-body h3 { font-size: 1.15rem; }
    .article-body p { margin: 0 0 1rem; }
    .article-body ul, .article-body ol { padding-left: 1.5rem; margin: 0 0 1rem; }
    .article-body li { margin-bottom: 0.3rem; }
    .article-body blockquote {
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      color: var(--fg-subtle);
      border-left: 3px solid var(--accent);
      background: var(--bg-soft);
      border-radius: 0 6px 6px 0;
    }
    .article-body hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }
    .article-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.92rem;
    }
    .article-body th, .article-body td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.7rem;
      text-align: left;
    }
    .article-body th { background: var(--bg-soft); font-weight: 600; }

    /* === Wikilink & block ref === */
    .wikilink {
      color: var(--wikilink);
      text-decoration: none;
      border-bottom: 1px solid color-mix(in srgb, var(--wikilink) 30%, transparent);
    }
    .wikilink:hover { background: var(--accent-soft); }
    .wikilink.broken {
      color: var(--wikilink-broken);
      border-bottom: 1px dashed var(--wikilink-broken);
    }
    .block-ref {
      font-family: var(--font-mono);
      font-size: 0.85em;
      color: var(--blockref);
      background: var(--bg-soft);
      padding: 0 0.3rem;
      border-radius: 4px;
      text-decoration: none;
    }
    .block-ref:hover { color: var(--accent); }

    /* === Code === */
    code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: var(--bg-code);
      padding: 0.15em 0.35em;
      border-radius: 4px;
    }
    pre {
      margin: 1rem 0;
      border-radius: 8px;
      overflow-x: auto;
      box-shadow: var(--shadow);
    }
    pre code {
      background: transparent;
      padding: 0;
      font-size: 0.88rem;
      line-height: 1.55;
    }
    /* shiki dual-theme */
    .shiki, .shiki span {
      color: var(--shiki-light);
      background-color: var(--shiki-light-bg);
    }
    @media (prefers-color-scheme: dark) {
      .shiki, .shiki span {
        color: var(--shiki-dark);
        background-color: var(--shiki-dark-bg);
      }
    }
    pre.shiki { padding: 1rem 1.1rem; }

    /* === Mermaid === */
    .mermaid-block {
      margin: 1.2rem 0;
      padding: 1rem;
      background: var(--bg-soft);
      border-radius: 8px;
      text-align: center;
      overflow-x: auto;
    }
    .mermaid-block svg { max-width: 100%; height: auto; }

    /* === Lists (note index, tag, search) === */
    .note-list { list-style: none; padding: 0; margin: 0; }
    .note-item {
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
    }
    .note-item:last-child { border-bottom: 0; }
    .note-link {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--fg);
      text-decoration: none;
    }
    .note-link:hover { color: var(--accent); }
    .note-meta {
      font-size: 0.82rem;
      color: var(--fg-muted);
      margin-top: 0.2rem;
    }
    .note-desc {
      font-size: 0.9rem;
      color: var(--fg-subtle);
      margin-top: 0.3rem;
    }
    .tag {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--tag-fg);
      background: var(--tag-bg);
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      text-decoration: none;
      margin-left: 0.25rem;
    }
    .tag:hover { filter: brightness(0.95); }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0 1.5rem; }
    .tag-chip {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--tag-fg);
      background: var(--tag-bg);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      text-decoration: none;
    }
    .tag-chip:hover { filter: brightness(0.95); }

    /* === Search === */
    .search-page input[type="search"] {
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      background: var(--bg-soft);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 0.5rem 0 1.5rem;
    }
    .search-page input[type="search"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .search-results { list-style: none; padding: 0; margin: 0; }
    .search-results li { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
    .search-results a { color: var(--accent); text-decoration: none; }
    .search-results .path { font-size: 0.8rem; color: var(--fg-muted); margin-top: 0.15rem; }
    .search-results .snippet {
      font-size: 0.88rem;
      color: var(--fg-subtle);
      margin-top: 0.3rem;
      line-height: 1.5;
    }
    .search-results mark {
      background: color-mix(in srgb, var(--accent) 22%, transparent);
      color: var(--fg);
      padding: 0 2px;
      border-radius: 3px;
    }
    .search-meta {
      font-size: 0.85rem;
      color: var(--fg-muted);
      margin-top: 0.3rem;
    }
    .empty { color: var(--fg-subtle); text-align: center; padding: 2rem 0; }

    /* === 404 === */
    .not-found { text-align: center; padding: 4rem 0; }
    .not-found h1 { font-size: 5rem; margin: 0; color: var(--accent); }

    /* === Footer === */
    footer.site {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 2rem 1.2rem 3rem;
      font-size: 0.8rem;
      color: var(--fg-muted);
      text-align: center;
      border-top: 1px solid var(--border);
    }
    footer.site a { color: var(--fg-muted); }

    /* === Heading anchors === */
    .header-anchor {
      color: var(--fg-muted);
      text-decoration: none;
      margin-right: 0.3rem;
      opacity: 0;
      transition: opacity 0.1s;
    }
    h1:hover .header-anchor,
    h2:hover .header-anchor,
    h3:hover .header-anchor,
    h4:hover .header-anchor { opacity: 1; }

    /* === Transclusion (嵌入) === */
    .transclude {
      margin: 1.5rem 0;
      padding: 0.8rem 1rem 1rem;
      background: var(--bg-soft);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
    }
    .transclude-header {
      font-size: 0.8rem;
      color: var(--fg-subtle);
      display: flex;
      gap: 0.4rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .transclude-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .transclude-link:hover { text-decoration: underline; }
    .transclude-body { font-size: 0.95rem; }
    .transclude-body > *:first-child { margin-top: 0; }
    .transclude-body > *:last-child { margin-bottom: 0; }
    .transclude-missing {
      background: color-mix(in srgb, var(--wikilink-broken) 10%, transparent);
      border-left-color: var(--wikilink-broken);
      color: var(--fg-subtle);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="{{BASE}}">{{VAULT_NAME}}</a>
      <nav class="nav">
        <a href="{{BASE}}">首页</a>
        <a href="{{BASE}}search.html">搜索</a>
        <a href="{{BASE}}rss.xml">RSS</a>
      </nav>
      <button class="theme-toggle" onclick="document.documentElement.classList.toggle('dark');localStorage.setItem('notevault.theme',document.documentElement.classList.contains('dark')?'dark':'light')">🌓</button>
    </div>
  </div>
  <main>
    {{CONTENT}}
  </main>
  <footer class="site">
    <p>由 <a href="https://github.com">NoteVault</a> 生成于 {{GENERATED_AT}} · 共 {{CONTENT}}</p>
  </footer>
  {{EXTRA_BODY}}
  <script>
    // Restore theme preference
    (function(){
      const t = localStorage.getItem('notevault.theme');
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</body>
</html>
